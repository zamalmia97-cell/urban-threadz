<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Threadz</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #111;
    color: #fff;
}

header {
    text-align: center;
    padding: 40px 20px;
    background: linear-gradient(45deg, #000, #222);
}

header h1 {
    font-size: 40px;
    letter-spacing: 2px;
}

.container {
    padding: 20px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.product {
    background: #1c1c1c;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.product:hover {
    transform: scale(1.05);
}

.product img {
    width: 100%;
}

.product-content {
    padding: 15px;
    text-align: center;
}

button {
    background: #ff4d4d;
    border: none;
    padding: 10px 15px;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #ff1a1a;
}
</style>

</head>
<body>

<header>
    <h1>Urban Threadz</h1>
    <p>Streetwear Collection</p>
</header>

<div class="container">
<div class="products">

<div class="product">
<img src="https://via.placeholder.com/300">
<div class="product-content">
<h3>Black Street Tee</h3>
<p>$25</p>
<a href="https://wa.me/8801234567890"><button>Order Now</button></a>
</div>
</div>

<div class="product">
<img src="https://via.placeholder.com/300">
<div class="product-content">
<h3>Minimal White Tee</h3>
<p>$22</p>
<a href="https://wa.me/8801234567890"><button>Order Now</button></a>
</div>
</div>

<div class="product">
<img src="https://via.placeholder.com/300">
<div class="product-content">
<h3>Graphic Urban Tee</h3>
<p>$28</p>
<a href="https://wa.me/8801234567890"><button>Order Now</button></a>
</div>
</div>

<div class="product">
<img src="https://via.placeholder.com/300">
<div class="product-content">
<h3>Vintage Style Tee</h3>
<p>$26</p>
<a href="https://wa.me/8801234567890"><button>Order Now</button></a>
</div>
</div>

</div>
</div>

</body>
</html>
